name: Build Desktop Installers

on:
  release:
    types: [created]

jobs:

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ImageMagick
        run: choco install imagemagick -y

      - name: Install dependencies
        run: npm install

      - name: Generate Windows icons
        run: node generate-icons.js

      - name: Build Windows installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Mac icon (.icns)
        run: |
          mkdir -p icon.iconset
          sips -z 16 16   build/icon-source.png --out icon.iconset/icon_16x16.png
          sips -z 32 32   build/icon-source.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32   build/icon-source.png --out icon.iconset/icon_32x32.png
          sips -z 64 64   build/icon-source.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 build/icon-source.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 build/icon-source.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 build/icon-source.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 build/icon-source.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 build/icon-source.png --out icon.iconset/icon_512x512.png
          iconutil -c icns icon.iconset -o build/icon.icns

      - name: Install dependencies
        run: npm install

      - name: Build Mac installer
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
